<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Browse Like a Billionaire Options</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <h1>Browse Like a Billionaire</h1>
      <fieldset>
        <legend>Ruby currency</legend>
        <label>
          <span>Display as</span>
          <select id="displayCurrency" name="displayCurrency">
            <option value="zwd">Original Zimbabwe dollar (Z$)</option>
          </select>
        </label>
      </fieldset>
      <fieldset id="customCurrencyFieldset" hidden>
        <legend>Custom currency</legend>
        <div class="custom-rate-row">
          <input id="customCurrencyCode" name="customCurrencyCode" maxlength="10" spellcheck="false" aria-label="Custom currency code">
          <span>=</span>
          <input id="customCurrencyBaseAmount" name="customCurrencyBaseAmount" type="number" min="0.0000000001" step="any" aria-label="Base amount">
          <select id="customCurrencyBaseCurrency" name="customCurrencyBaseCurrency" aria-label="Base currency"></select>
        </div>
      </fieldset>
      <fieldset>
        <legend>Number format</legend>
        <p id="numberFormatHint">Available when the display currency is above 1:1,000,000 per USD.</p>
        <label>
          <input type="radio" name="displayNotation" value="scientific">
          <span>Scientific notation</span>
          <small>Z$3.5x10⁴¹</small>
        </label>
        <label>
          <input type="radio" name="displayNotation" value="plain">
          <span>Plain decimal</span>
          <small>Z$350,000,000,000,000,000,000,000,000,000,000,000,000,000</small>
        </label>
      </fieldset>
      <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
